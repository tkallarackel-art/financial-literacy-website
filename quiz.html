<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Financial Literacy Homepage</title>
  <link rel="icon" type="image/x-icon" href="/images/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <main>

      <!-- The sidebar -->
    <nav class="navbar">
        <h2>Menu</h2>
      <a href="index.html">Home</a>
      <a href="jobs.html">Jobs & Taxes</a>
      <a href="kiwisaver.html">Kiwisavers</a>
      <a class="active" href="quiz.html">Quizzes</a>
    </nav>


    <div class="content">

          <div class="banner">
            <img src="/images/pencil-lying-on-paper.jpg" class="banner-img" alt="A plain peice of white paper has a plain brown writing pencil lying on it">
            <h1 class="banner-text">Quizzes</h1>
        </div>

      <div class="quiz-box-parent">


        <div class="quiz-div1">
          <div class="quiz">
              <h1 class="topic">KiwiSaver</h1>

              <div class="parent-quiz-inside">

                <div class="div1">
                  <div class="quiz-image">
                    <img class="q-image" src="/images/banknote-pile.jpg" alt="A pile of U.S bank notes sitting ontop of eachother.">
                  </div>
                </div>

                <div class="div2">
                  <div class="question"></div>
                    <div class="options"></div>
                    <button class="submit">Submit</button>
                </div>

              </div>
            
          </div>
        </div>

        <div class="quiz-div2">
          <div class="score-box">
            <h1>Recent Score</h1>
            <div class="recent-score">
                <p>Recent Score</p>
                <div class="score-number">
                    <span class="score">--</span>
                    <span class="total">/2</span>
                </div>
            </div>
          </div>
        </div>

        <div class="quiz-div3">
          <div class="quiz">
            <h1 class="topic">Jobs & Taxes</h1>

            <div class="parent-quiz-inside">

              <div class="div1">
                <div class="quiz-image">
                  <img class="q-image" src="/images/person-completing-form-with-laptop.jpg" alt="A person is sitting at her dest with her laptop and a tax form. She is completeing the form.">
                </div>
              </div>

              <div class="div2">
                <div class="question"></div>
                  <div class="options"></div>
                  <button class="submit">Submit</button>
                  
              </div>

            </div>
      
          </div>    
        </div>

        <div class="quiz-div4">
          <div class="score-box">
            <h1>Recent Score</h1>
            <div class="recent-score">
                <p>Recent Score</p>
                <div class="score-number">
                    <span class="score">--</span>
                    <span class="total">/2</span>
                </div>
            </div>
          </div>
        </div>

      </div>


    </div>

    <script src="script.js"></script>   
  
    </main>
